<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
p{
	color:red;
}
div > h1 {
	color:blue;
}
div span h1{
	color:green;
}
div > p + h1{
	color:orange;
}
</style>

</head>
<body>
	<div>
		<p>hello java</p>
		<h1>hello oracle</h1>
		<h1>hello jsp</h1>
		<span>
			<h1>hello spring</h1>
		</span>
	</div>
</body>
</html>
