<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
.table{
	border-collapse: collapse;
	border-top-width: 2px;
	border-bottom-width: 1px;
	
	border-top-style: solid;
	border-bottom-style: solid;
	
	border-top-color: #333;
	border-bottom-color: #333; 
}
.table td, th {
	margin: 0px;
	padding: 8px;
	font-size: 16px;
}
.table th{
	background-color: blue;
	color: white;
	border-bottom-color: #333;
	border-bottom-width: 1px; 
}
.table td{
	border-bottom-color: #666;
	border-bottom-width: 1px;
	border-bottom-style: dotted; 
}
</style>
</head>
<body>
	<table class="table">
		<thead>
			<tr>
				<th>이름</th>
				<th>주소</th>
				<th>전화</th>
			</tr>
		</thead>
		<tbody>
			<tr>
				<td>김누구</td>
				<td>서울</td>
				<td>111-1111</td>
			</tr>
			<tr>
				<td>이누구</td>
				<td>서울</td>
				<td>111-11121</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
