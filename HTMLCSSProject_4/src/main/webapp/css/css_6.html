<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
body{
	font-family: sans-serif, "맑은 고딕", 궁서체;
	margin: 20px;
}
h2{
	margin-top: 40px;
	border-bottom: 2px solid #333;
	padding-bottom: 5px; 
}
.box{
	width: 200px;
	height: 130px;
	margin: 15px;
	padding: 10px;
	border: 2px solid grey;
	display: inline-block;
	font-size: 14px;
	font-weight: bold;
}
</style>
</head>
<body>
	<h1>배경 속성 예제</h1>
	<h2>background-color</h2>
	<div class="box" style="background-color: lightblue">lightblue</div>
	<div class="box" style="background-color: lightgreen">lightgreen</div>
	<div class="box" style="background-color: lightyellow">lightyellow</div>
	<h2>background-repeat 반복 여부</h2>
	<div class="box" style="background: url('../img/tile.jpg') repeat;"></div>
	<div class="box" style="background: url('../img/tile.jpg') no-repeat;"></div>
	<div class="box" style="background: url('../img/tile.jpg') repeat-x"></div>
	<div class="box" style="background: url('../img/tile.jpg') repeat-y"></div>
	<h2>background-image 출력</h2>
	<div class="box" style="background: url('../img/back.jpg')">이미지 출력</div>
	<div class="box" style="background: url('../img/back.jpg');background-size: 100% 100%">size</div>
	<div class="box" style="background: url('../img/back.jpg');background-size: cover">cover</div>
	<div class="box" style="background: url('../img/back.jpg');background-size: contain">contain</div>
	<h2>background attachment: 이미지 고정여부</h2>
	<div class="box" style="overflow: auto; background: url('../img/back.jpg');
	background-repeat: no-repeat;
	background-position: center;
	background-attachment: fixed;
	">
	background-attachment<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
	<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
	<br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
	</div>
	<div class="box" style="background: url('../img/back.jpg') no-repeat center/cover;">단축</div>
</body>
</html>
