<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
img{
width: 130px;
height: 200px;
margin-left: 10px;
margin-top: 100px;
}
img:nth-child(1){
	border:2px solid red;
}
img:nth-child(2){
	border:2px dotted red;
}
img:nth-child(3){
	border:2px dashed red;
}
img:nth-child(4){
	border:2px double red;
}
img:nth-child(5){
	border:2px groove red;
}
img:nth-child(6){
	border:2px inset red;
}
img:nth-child(7){
	border:2px outset red;
}
</style>
</head>
<body>
	<img src="../img/m1.jpg">
	<img src="../img/m2.jpg">
	<img src="../img/m3.jpg">
	<img src="../img/m4.jpg">
	<img src="../img/m5.jpg">
	<img src="../img/m6.jpg">
	<img src="../img/m7.jpg">
</body>
</html>
