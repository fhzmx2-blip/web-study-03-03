<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<table border=1 bordercolor="black" width=500>
		<tbody>
			<tr>
				<td>문자열</td>
				<td><input type=text size=15></td>
			</tr>
			<tr>
				<td>암호문자열</td>
				<td><input type="password" size=15></td>
			</tr>
			<tr>
				<td>파일 업로드</td>
				<td><input type="file" size=25 multiple></td>
			</tr>
			<tr>
				<td>Spinner(숫자)</td>
				<td><input type="number" min="1" max="100"></td>
			</tr>
			<tr>
				<td>Slider(음량 가격 등 조절)</td>
				<td><input type="range" min="100" max="10000"></td>
			</tr>
			<tr>
				<td>달력</td>
				<td><input type="date"></td>
			</tr>
			<tr>
				<td>일반 버튼</td>
				<td><input type="button" value="로그인"></td>
			</tr>
			<tr>
				<td>전송 버튼</td>
				<td><input type="submit" value="전송"></td>
			</tr>
			<tr>
				<td>초기화 버튼</td>
				<td><input type="reset" value="초기화"></td>
			</tr>
			<tr>
				<td>전송_1 버튼</td>
				<td><button>전송</button></td>
			</tr>
			<tr>
				<td>전송_2 버튼</td>
				<td><input type="image" src="re_icon.png"></td>
			</tr>
			<tr>
				<td>라디오 버튼</td>
				<td>
				<input type="radio" name="남">
				<input type="radio" name="여">
				</td>
			</tr>
			<tr>
				<td>체크 박스</td>
				<td>
				<input type="checkbox">낚시
				<input type="checkbox">운동
				<input type="checkbox">여행
				<input type="checkbox">게임
				<input type="checkbox">독서
				</td>
			</tr>
			<tr>
				<td>보안</td>
				<td>
				<input type=hidden>
				</td>
			</tr>
			<tr>
				<td>여러줄</td>
				<td>
				<textarea rows="5" cols="30"></textarea>
				</td>
			</tr>
			<tr>
				<td>콤보박스</td>
				<td>
					<select multiple>
					<option>1</option>
					<option>2</option>
					<option>3</option>
					<option>4</option>
					<option>5</option>
					</select>
				</td>
			</tr>
		</tbody>
	</table>
</body>
</html>
