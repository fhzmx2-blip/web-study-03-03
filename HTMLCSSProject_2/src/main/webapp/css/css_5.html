<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
li:first-child{
	color:green;
	background:grey;
}
li:last-child{
	color:green;
	background:yellow;
}
li:nth-child(1){
	color: blue;
}
li:nth-child(2){
	color: pink;
}
li:nth-child(3){
	color: orange;
}
li:nth-child(2n){
	color: maroon;
}
li:nth-child(2n+1){
	color: fuchsia;
}
</style>
</head>
<body>
	<ul>
		<li>메뉴 1</li>
		<li>메뉴 2</li>
		<li>메뉴 3</li>
		<li>메뉴 4</li>
		<li>메뉴 5</li>
		<li>메뉴 6</li>
		<li>메뉴 7</li>
	</ul>
</body>
</html>
